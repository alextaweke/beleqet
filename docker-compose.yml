version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    container_name: beleqet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: beleqet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beleqet-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: beleqet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - beleqet-network

  # ── OpenSearch ──
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: beleqet-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - beleqet-network

  # ── OpenSearch Dashboards ──
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: beleqet-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - beleqet-network

  # ── Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beleqet-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/beleqet
      - REDIS_URL=redis://redis:6379
      - OPENSEARCH_URL=http://opensearch:9200
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - opensearch
    networks:
      - beleqet-network
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beleqet-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - beleqet-network
    restart: unless-stopped

  # ── Nginx (Optional - Production) ──
  nginx:
    image: nginx:alpine
    container_name: beleqet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - beleqet-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  beleqet-network:
    driver: bridge