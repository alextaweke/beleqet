version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: beleqet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: beleqet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: beleqet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: beleqet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beleqet-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

    environment:
      NODE_ENV: production
      PORT: 4000

      DATABASE_URL: postgresql://beleqet:password@postgres:5432/beleqet

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:

      FRONTEND_URL: http://localhost:3000

      JWT_ACCESS_SECRET: change_this_secret
      JWT_ACCESS_EXPIRES: 15m

      JWT_REFRESH_SECRET: change_this_refresh_secret
      JWT_REFRESH_EXPIRES: 30d

      OPENAI_API_KEY: your_key_here

  frontend:
    build:
      context: ./beleqet-jobs-nextjs
      dockerfile: Dockerfile
    container_name: beleqet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

volumes:
  postgres_data:
  redis_data: